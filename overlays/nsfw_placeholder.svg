<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" rx="8" fill="#1a1b26"/>
  <rect x="20" y="20" width="260" height="260" rx="6" fill="none" stroke="#3b3d52" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Eye-slash icon -->
  <g transform="translate(150,130)" fill="none" stroke="#5a5d72" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Eye shape -->
    <path d="M-50,0 C-50,0 -25,-30 0,-30 C25,-30 50,0 50,0 C50,0 25,30 0,30 C-25,30 -50,0 -50,0Z"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="12"/>
    <!-- Slash -->
    <line x1="-40" y1="35" x2="40" y2="-35" stroke-width="6"/>
  </g>
  <text x="150" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5a5d72">Art Hidden</text>
</svg>
