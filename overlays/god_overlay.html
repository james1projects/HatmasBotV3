<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>God Overlay - HatmasBot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    width: 360px;
    height: 120px;
  }

  .container {
    width: 360px;
    height: 120px;
    position: relative;
    transform: translateX(-380px);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .container.visible {
    transform: translateX(0);
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    background: linear-gradient(135deg, rgba(20, 20, 35, 0.95), rgba(35, 25, 55, 0.95));
    border-radius: 12px;
    border: 1px solid rgba(120, 80, 200, 0.4);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 15px rgba(120, 80, 200, 0.2);
  }

  .god-portrait {
    width: 100px;
    height: 100%;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .god-portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.4s ease;
  }

  .team-indicator {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
  }

  .team-indicator.order { background: linear-gradient(90deg, #4a9eff, #2060c0); }
  .team-indicator.chaos { background: linear-gradient(90deg, #ff4a4a, #c02020); }

  .info {
    flex: 1;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  .god-name {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.6;
  }

  .team-label.order { color: #6ab0ff; }
  .team-label.chaos { color: #ff6a6a; }

  .stats-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 4px;
  }

  .kda {
    font-size: 18px;
    font-weight: 700;
    color: #e8e0ff;
    letter-spacing: 1px;
  }

  .kda .kills { color: #5dff5d; }
  .kda .deaths { color: #ff5d5d; }
  .kda .assists { color: #ffcc5d; }
  .kda .slash { color: rgba(255, 255, 255, 0.35); margin: 0 1px; }

  .gold {
    font-size: 13px;
    color: #ffd700;
    font-weight: 600;
    opacity: 0.85;
  }

  .gold-icon {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #ffd700;
    border-radius: 50%;
    margin-right: 3px;
    vertical-align: middle;
    box-shadow: 0 0 4px rgba(255, 215, 0, 0.5);
  }

  @keyframes statPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .kda.pulse {
    animation: statPulse 0.4s ease;
  }
</style>
</head>
<body>

<div class="container" id="container">
  <div class="card">
    <div class="god-portrait">
      <img id="godImg" src="" alt="">
      <div class="team-indicator" id="teamIndicator"></div>
    </div>
    <div class="info">
      <div class="team-label" id="teamLabel"></div>
      <div class="god-name" id="godName"></div>
      <div class="stats-row">
        <div class="kda" id="kda"></div>
        <div class="gold" id="gold"></div>
      </div>
    </div>
  </div>
</div>

<script src="/overlays/overlay_client.js"></script>
<script>
let currentGod = null;
let lastKDA = '';

function formatGold(gold) {
  if (!gold && gold !== 0) return '';
  if (gold >= 1000) return (gold / 1000).toFixed(1) + 'k';
  return String(gold);
}

function renderSmiteData(smite) {
  if (!smite || !smite.god) return;

  const god = smite.god;
  const stats = god.stats || {};
  const team = (god.team || 'unknown').toLowerCase();

  // Update portrait
  const godImg = document.getElementById('godImg');
  if (currentGod !== god.name) {
    godImg.src = god.imageUrl || '';
    currentGod = god.name;
  }

  // Team indicator + label
  const indicator = document.getElementById('teamIndicator');
  indicator.className = 'team-indicator ' + team;

  const teamLabel = document.getElementById('teamLabel');
  teamLabel.className = 'team-label ' + team;
  teamLabel.textContent = team === 'order' ? 'ORDER' : team === 'chaos' ? 'CHAOS' : '';

  // God name
  document.getElementById('godName').textContent = god.name;

  // KDA
  const kdaEl = document.getElementById('kda');
  const kdaStr = `${stats.kills || 0}/${stats.deaths || 0}/${stats.assists || 0}`;

  kdaEl.innerHTML =
    `<span class="kills">${stats.kills || 0}</span>` +
    `<span class="slash">/</span>` +
    `<span class="deaths">${stats.deaths || 0}</span>` +
    `<span class="slash">/</span>` +
    `<span class="assists">${stats.assists || 0}</span>`;

  // Pulse on KDA change
  if (lastKDA && lastKDA !== kdaStr) {
    kdaEl.classList.remove('pulse');
    void kdaEl.offsetWidth;
    kdaEl.classList.add('pulse');
  }
  lastKDA = kdaStr;

  // Gold
  const goldEl = document.getElementById('gold');
  if (stats.gold) {
    goldEl.innerHTML = `<span class="gold-icon"></span>${formatGold(stats.gold)}`;
  } else {
    goldEl.textContent = '';
  }
}

HatmasOverlay.connect('god_overlay', {
  container: '#container',
  onShow(data) {
    // god_detected event — data is the full smite state
    renderSmiteData(data);
  },
  onUpdate(data) {
    // Live stat updates while in match
    renderSmiteData(data);
  },
  onHide() {
    // match_end_confirmed — reset
    currentGod = null;
    lastKDA = '';
  }
});
</script>

</body>
</html>
