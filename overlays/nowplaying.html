<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  overflow: hidden;
  width: 450px;
  height: 120px;
}

.now-playing {
  position: absolute;
  bottom: 10px;
  left: 10px;
  width: 430px;
  height: 100px;
  background: rgba(10, 11, 18, 0.92);
  border: 1px solid rgba(196, 168, 130, 0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  transform: translateX(-460px);
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(10px);
}

.now-playing.visible {
  transform: translateX(0);
}

.album-art {
  width: 80px;
  height: 80px;
  border-radius: 6px;
  background: rgba(196, 168, 130, 0.1);
  flex-shrink: 0;
  object-fit: cover;
}

.info {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 3px;
}

.label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: rgba(196, 168, 130, 0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.title {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #e8ddd0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.artist {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 300;
  color: rgba(196, 168, 130, 0.7);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 2px;
}

.requester {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: rgba(196, 168, 130, 0.5);
}

.likes {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: rgba(232, 168, 124, 0.8);
  transition: transform 0.3s ease;
}

.likes.pulse {
  transform: scale(1.3);
}

.like-cmd {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: rgba(196, 168, 130, 0.35);
  border: 1px solid rgba(196, 168, 130, 0.15);
  border-radius: 3px;
  padding: 0 4px;
  letter-spacing: 0.5px;
}

.progress-bar {
  position: absolute;
  bottom: 0;
  left: 14px;
  right: 14px;
  height: 2px;
  background: rgba(196, 168, 130, 0.1);
  border-radius: 1px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: rgba(196, 168, 130, 0.5);
  border-radius: 1px;
  width: 0%;
  transition: width 1s linear;
}

.time {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: rgba(196, 168, 130, 0.3);
  position: absolute;
  bottom: 6px;
  right: 14px;
}

/* === Heart animation === */
.heart-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  border-radius: 8px;
}

.floating-heart {
  position: absolute;
  font-size: 18px;
  animation: floatHeart 1.8s ease-out forwards;
  pointer-events: none;
  opacity: 0;
  filter: drop-shadow(0 0 4px rgba(232, 120, 100, 0.5));
}

@keyframes floatHeart {
  0% {
    opacity: 0;
    transform: translateY(0) scale(0.4) rotate(0deg);
  }
  15% {
    opacity: 1;
    transform: translateY(-8px) scale(1.1) rotate(-5deg);
  }
  40% {
    opacity: 1;
    transform: translateY(-30px) scale(1) rotate(5deg);
  }
  100% {
    opacity: 0;
    transform: translateY(-70px) scale(0.6) rotate(-10deg);
  }
}
</style>
</head>
<body>

<div class="now-playing" id="nowPlaying">
  <div class="heart-container" id="heartContainer"></div>
  <img class="album-art" id="albumArt" src="" alt="">
  <div class="info">
    <div class="label" id="nowPlayingLabel">now playing</div>
    <div class="title" id="songTitle">—</div>
    <div class="artist" id="songArtist">—</div>
    <div class="meta-row">
      <span class="requester" id="requester">—</span>
      <span class="likes" id="likes">♡ 0</span>
      <span class="like-cmd">!like</span>
    </div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="time" id="timeDisplay">0:00 / 0:00</div>
</div>

<script src="/overlays/overlay_client.js"></script>
<script>
const el = {
  container: document.getElementById('nowPlaying'),
  art: document.getElementById('albumArt'),
  title: document.getElementById('songTitle'),
  artist: document.getElementById('songArtist'),
  requester: document.getElementById('requester'),
  likes: document.getElementById('likes'),
  progress: document.getElementById('progressFill'),
  time: document.getElementById('timeDisplay'),
  label: document.getElementById('nowPlayingLabel'),
  heartContainer: document.getElementById('heartContainer'),
};

let currentSongData = null;
let lastLikes = 0;
let progressAnimFrame = null;

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function spawnHearts(count = 5) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const heart = document.createElement('span');
      heart.className = 'floating-heart';
      heart.textContent = '♥';

      const xPos = 60 + Math.random() * 60;
      heart.style.left = xPos + '%';
      heart.style.bottom = '10px';

      const scale = 0.7 + Math.random() * 0.8;
      heart.style.fontSize = (18 * scale) + 'px';
      heart.style.animationDelay = (Math.random() * 0.3) + 's';
      heart.style.animationDuration = (1.4 + Math.random() * 0.8) + 's';

      const colors = [
        'rgba(232, 120, 100, 0.9)',
        'rgba(240, 140, 120, 0.9)',
        'rgba(220, 100, 100, 0.9)',
        'rgba(255, 150, 130, 0.85)',
        'rgba(232, 168, 124, 0.9)',
      ];
      heart.style.color = colors[Math.floor(Math.random() * colors.length)];

      el.heartContainer.appendChild(heart);
      heart.addEventListener('animationend', () => heart.remove());
    }, i * 120);
  }
}

function renderSong(data) {
  if (!data) return;

  el.title.textContent = data.title || '—';
  el.artist.textContent = data.artist || '—';
  el.art.src = data.album_art || '';
  el.art.style.display = data.album_art ? 'block' : 'none';

  if (data.requester) {
    el.requester.textContent = `requested by ${data.requester}`;
  } else {
    el.requester.textContent = '';
  }

  el.label.textContent = data.is_playlist ? 'playing from playlist' : 'now playing';

  // Update likes
  const likeCount = data.likes || 0;
  if (data.is_playlist && likeCount === 0) {
    el.likes.style.display = 'none';
  } else {
    el.likes.style.display = '';
    el.likes.textContent = `♡ ${likeCount}`;
    if (likeCount > lastLikes && lastLikes > 0) {
      el.likes.classList.add('pulse');
      setTimeout(() => el.likes.classList.remove('pulse'), 300);
    }
    lastLikes = likeCount;
  }

  // Store for progress interpolation
  currentSongData = data;
}

function updateProgress(data) {
  if (!data || !data.duration_ms) return;

  // Update stored song data with latest progress info
  if (currentSongData) {
    if (data.progress_ms !== undefined) currentSongData.progress_ms = data.progress_ms;
    if (data.last_updated !== undefined) currentSongData.last_updated = data.last_updated;
    if (data.is_playing !== undefined) currentSongData.is_playing = data.is_playing;
    if (data.likes !== undefined) {
      const oldLikes = currentSongData.likes || 0;
      currentSongData.likes = data.likes;
      const newLikes = data.likes || 0;
      if (newLikes > oldLikes) {
        el.likes.textContent = `♡ ${newLikes}`;
        el.likes.classList.add('pulse');
        setTimeout(() => el.likes.classList.remove('pulse'), 300);
        lastLikes = newLikes;
      }
    }
  }
}

// Smooth progress bar interpolation — runs every frame
function animateProgress() {
  if (currentSongData && currentSongData.duration_ms) {
    let elapsed;

    if (currentSongData.progress_ms !== undefined && currentSongData.last_updated) {
      const sincePoll = (Date.now() / 1000 - currentSongData.last_updated) * 1000;
      elapsed = currentSongData.progress_ms + (currentSongData.is_playing !== false ? sincePoll : 0);
    } else if (currentSongData.started_at) {
      elapsed = (Date.now() / 1000 - currentSongData.started_at) * 1000;
    } else {
      elapsed = 0;
    }

    elapsed = Math.max(0, Math.min(elapsed, currentSongData.duration_ms));
    const pct = (elapsed / currentSongData.duration_ms) * 100;
    el.progress.style.width = `${pct}%`;
    el.time.textContent = `${formatTime(elapsed)} / ${formatTime(currentSongData.duration_ms)}`;
  }

  if (HatmasOverlay.isVisible()) {
    progressAnimFrame = requestAnimationFrame(animateProgress);
  }
}

// === OVERLAY MANAGER CONNECTION ===

HatmasOverlay.connect('now_playing', {
  container: '#nowPlaying',
  onShow(data) {
    // song_change event — new song started
    renderSong(data);
    lastLikes = data.likes || 0;

    // Start progress animation loop
    if (progressAnimFrame) cancelAnimationFrame(progressAnimFrame);
    progressAnimFrame = requestAnimationFrame(animateProgress);
  },
  onUpdate(data) {
    if (!data) return;

    // Check if this is a like event (song_like updates come through here)
    // The overlay manager sends update for any event with data while visible
    // that isn't a show trigger.

    // Check for like_event field (hearts!)
    if (data.like_event) {
      spawnHearts(6);
    }

    // Update progress and song data
    updateProgress(data);
  },
  onHide() {
    // song_queue_empty or song_stopped, or auto-hide timer expired
    currentSongData = null;
    lastLikes = 0;
    if (progressAnimFrame) {
      cancelAnimationFrame(progressAnimFrame);
      progressAnimFrame = null;
    }
  }
});
</script>
</body>
</html>
