<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  overflow: hidden;
  width: 450px;
  height: 120px;
}

.now-playing {
  position: absolute;
  bottom: 10px;
  left: 10px;
  width: 430px;
  height: 100px;
  background: rgba(10, 11, 18, 0.92);
  border: 1px solid rgba(196, 168, 130, 0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  transform: translateX(-460px);
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(10px);
}

.now-playing.visible {
  transform: translateX(0);
}

.album-art {
  width: 80px;
  height: 80px;
  border-radius: 6px;
  background: rgba(196, 168, 130, 0.1);
  flex-shrink: 0;
  object-fit: cover;
}

.info {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 3px;
}

.label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: rgba(196, 168, 130, 0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.title {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #e8ddd0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.artist {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 300;
  color: rgba(196, 168, 130, 0.7);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 2px;
}

.requester {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: rgba(196, 168, 130, 0.5);
}

.likes {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: rgba(232, 168, 124, 0.8);
  transition: transform 0.3s ease;
}

.likes.pulse {
  transform: scale(1.3);
}

.progress-bar {
  position: absolute;
  bottom: 0;
  left: 14px;
  right: 14px;
  height: 2px;
  background: rgba(196, 168, 130, 0.1);
  border-radius: 1px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: rgba(196, 168, 130, 0.5);
  border-radius: 1px;
  width: 0%;
  transition: width 1s linear;
}

.time {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: rgba(196, 168, 130, 0.3);
  position: absolute;
  bottom: 6px;
  right: 14px;
}

/* === Heart animation === */
.heart-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  border-radius: 8px;
}

.floating-heart {
  position: absolute;
  font-size: 18px;
  animation: floatHeart 1.8s ease-out forwards;
  pointer-events: none;
  opacity: 0;
  filter: drop-shadow(0 0 4px rgba(232, 120, 100, 0.5));
}

@keyframes floatHeart {
  0% {
    opacity: 0;
    transform: translateY(0) scale(0.4) rotate(0deg);
  }
  15% {
    opacity: 1;
    transform: translateY(-8px) scale(1.1) rotate(-5deg);
  }
  40% {
    opacity: 1;
    transform: translateY(-30px) scale(1) rotate(5deg);
  }
  100% {
    opacity: 0;
    transform: translateY(-70px) scale(0.6) rotate(-10deg);
  }
}
</style>
</head>
<body>

<div class="now-playing" id="nowPlaying">
  <div class="heart-container" id="heartContainer"></div>
  <img class="album-art" id="albumArt" src="" alt="">
  <div class="info">
    <div class="label" id="nowPlayingLabel">now playing</div>
    <div class="title" id="songTitle">—</div>
    <div class="artist" id="songArtist">—</div>
    <div class="meta-row">
      <span class="requester" id="requester">—</span>
      <span class="likes" id="likes">♡ 0</span>
    </div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="time" id="timeDisplay">0:00 / 0:00</div>
</div>

<script>
const API_URL = 'http://localhost:8069/api/state';
const el = {
  container: document.getElementById('nowPlaying'),
  art: document.getElementById('albumArt'),
  title: document.getElementById('songTitle'),
  artist: document.getElementById('songArtist'),
  requester: document.getElementById('requester'),
  likes: document.getElementById('likes'),
  progress: document.getElementById('progressFill'),
  time: document.getElementById('timeDisplay'),
  label: document.getElementById('nowPlayingLabel'),
  heartContainer: document.getElementById('heartContainer'),
};

let currentSong = null;
let lastLikes = 0;
let hideTimer = null;
let isVisible = false;
let lastLikeEvent = 0;  // Track the like_event timestamp we last saw
let likeReshown = false; // True when overlay was re-shown by a like (not by a song starting)

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function showOverlay() {
  if (hideTimer) {
    clearTimeout(hideTimer);
    hideTimer = null;
  }
  el.container.classList.add('visible');
  isVisible = true;
}

function hideOverlay(delay = 0) {
  if (hideTimer) {
    clearTimeout(hideTimer);
    hideTimer = null;
  }
  if (delay > 0) {
    hideTimer = setTimeout(() => {
      el.container.classList.remove('visible');
      isVisible = false;
      hideTimer = null;
    }, delay);
  } else {
    el.container.classList.remove('visible');
    isVisible = false;
  }
}

function spawnHearts(count = 5) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const heart = document.createElement('span');
      heart.className = 'floating-heart';
      heart.textContent = '♥';

      // Random position along the bottom-right area of the overlay
      const xPos = 60 + Math.random() * 60; // 60%–120% from left (clustered right side)
      heart.style.left = xPos + '%';
      heart.style.bottom = '10px';

      // Random size variation
      const scale = 0.7 + Math.random() * 0.8;
      heart.style.fontSize = (18 * scale) + 'px';

      // Slight delay variation for natural feel
      heart.style.animationDelay = (Math.random() * 0.3) + 's';
      heart.style.animationDuration = (1.4 + Math.random() * 0.8) + 's';

      // Random warm color
      const colors = [
        'rgba(232, 120, 100, 0.9)',
        'rgba(240, 140, 120, 0.9)',
        'rgba(220, 100, 100, 0.9)',
        'rgba(255, 150, 130, 0.85)',
        'rgba(232, 168, 124, 0.9)',
      ];
      heart.style.color = colors[Math.floor(Math.random() * colors.length)];

      el.heartContainer.appendChild(heart);

      // Clean up after animation
      heart.addEventListener('animationend', () => heart.remove());
    }, i * 120);
  }
}

function updateDisplay(data) {
  const np = data.now_playing;

  // Check for like events (hearts!) — check BEFORE the np null check
  // so hearts still work when overlay is hidden (like on a playlist song)
  if (data.like_event && data.like_event > lastLikeEvent) {
    lastLikeEvent = data.like_event;
    spawnHearts(6);
    if (!isVisible) {
      // Overlay was hidden — re-show it and schedule hide 5s after latest like
      showOverlay();
      likeReshown = true;
      hideOverlay(5000);
    } else if (likeReshown) {
      // Overlay is visible from a previous like re-show — reset the 5s timer
      hideOverlay(5000);
    }
    // If visible from normal playback (likeReshown=false), don't set any hide timer
  }

  if (!np) {
    // No song data — hide after 5 seconds
    if (isVisible && !hideTimer) {
      hideOverlay(5000);
    }
    currentSong = null;
    likeReshown = false;
    return;
  }

  const songKey = `${np.title}_${np.artist}`;
  const isNewSong = songKey !== currentSong;

  if (isNewSong) {
    // Reset likeReshown BEFORE checking like event, so a like during a new song
    // doesn't incorrectly think the overlay was already re-shown by a like
    likeReshown = false;
    currentSong = songKey;
    el.title.textContent = np.title || '—';
    el.artist.textContent = np.artist || '—';
    el.art.src = np.album_art || '';
    el.art.style.display = np.album_art ? 'block' : 'none';

    // Show requester or "playlist" label
    if (np.requester) {
      el.requester.textContent = `requested by ${np.requester}`;
    } else {
      el.requester.textContent = '';
    }

    // Update label for playlist vs requested songs
    el.label.textContent = np.is_playlist ? 'playing from playlist' : 'now playing';

    // Show the overlay (cancels any pending hide)
    showOverlay();

    // Playlist songs auto-hide; requested songs stay visible
    if (np.is_playlist) {
      const hideMs = (data.playlist_auto_hide_seconds || 8) * 1000;
      hideOverlay(hideMs);
    }
  }

  // Update likes with pulse animation
  const likeCount = np.likes || 0;
  if (np.is_playlist && likeCount === 0) {
    // Hide likes counter for playlist songs with no likes
    el.likes.style.display = 'none';
  } else {
    el.likes.style.display = '';
    if (likeCount !== lastLikes) {
      el.likes.textContent = `♡ ${likeCount}`;
      if (likeCount > lastLikes) {
        el.likes.classList.add('pulse');
        setTimeout(() => el.likes.classList.remove('pulse'), 300);
      }
      lastLikes = likeCount;
    }
  }

  // Update progress
  if (np.duration_ms) {
    let elapsed;

    if (np.progress_ms !== undefined && np.last_updated) {
      const sincePoll = (Date.now() / 1000 - np.last_updated) * 1000;
      elapsed = np.progress_ms + (np.is_playing !== false ? sincePoll : 0);
    } else if (np.started_at) {
      elapsed = (Date.now() / 1000 - np.started_at) * 1000;
    } else {
      elapsed = 0;
    }

    elapsed = Math.max(0, Math.min(elapsed, np.duration_ms));
    const pct = (elapsed / np.duration_ms) * 100;
    el.progress.style.width = `${pct}%`;
    el.time.textContent = `${formatTime(elapsed)} / ${formatTime(np.duration_ms)}`;
  }
}

async function poll() {
  try {
    const resp = await fetch(API_URL);
    const data = await resp.json();
    updateDisplay(data);
  } catch (e) {
    // Server not ready yet
  }
}

setInterval(poll, 1000);
poll();
</script>
</body>
</html>
