<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hatmas Market — Match End v2</title>
<link rel="stylesheet" href="hatmas_theme.css">
<style>
  body {
    background: transparent;
    overflow: hidden;
    width: 420px;
    height: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .report {
    width: 380px;
    background: var(--hm-bg);
    border: 1px solid var(--hm-border);
    border-radius: 10px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(15px);
    animation: enter 0.4s ease-out 0.3s forwards;
    /* exit animation removed for prototype testing — production uses websocket hide */
  }

  @keyframes enter {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes exit {
    to { opacity: 0; transform: translateY(-10px); }
  }

  /* Result header */
  .result {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    position: relative;
  }

  .result.win { border-bottom: 1px solid var(--hm-green-bg); }
  .result.loss { border-bottom: 1px solid var(--hm-red-bg); }

  .god-img {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--hm-icon-bg);
    flex-shrink: 0;
  }

  .god-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .result-info { flex: 1; }

  .result-tag {
    font-family: 'BigNoodleTitling', 'Poppins', sans-serif;
    font-weight: normal;
    font-size: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .win .result-tag { color: var(--hm-green); }
  .loss .result-tag { color: var(--hm-red); }

  .result-sub {
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    color: var(--hm-text-muted);
  }

  .kda-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .kda-big {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: var(--hm-text);
    text-align: right;
  }

  .streak-badge {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 4px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .streak-badge.win {
    background: var(--hm-green-bg);
    color: var(--hm-green);
  }

  .streak-badge.loss {
    background: var(--hm-red-bg);
    color: var(--hm-red);
  }

  /* Price movement */
  .movement {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .prices {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .old-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: var(--hm-text-muted);
    text-decoration: line-through;
  }

  .arrow {
    color: var(--hm-border-subtle);
    font-size: 14px;
  }

  .new-price {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 24px;
  }

  .new-price.up { color: var(--hm-green); }
  .new-price.down { color: var(--hm-red); }

  .change-badge {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    padding: 3px 10px;
    border-radius: 5px;
  }

  .change-badge.up {
    color: var(--hm-green);
    background: var(--hm-green-bg);
  }

  .change-badge.down {
    color: var(--hm-red);
    background: var(--hm-red-bg);
  }

  /* Share distribution */
  .shares {
    margin: 0 16px 12px;
    padding: 9px 12px;
    background: var(--hm-separator);
    border: 1px solid var(--hm-border-subtle);
    border-radius: 6px;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    color: var(--hm-text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .shares strong {
    color: var(--hm-text);
  }

  /* Session movers */
  .movers {
    padding: 0 16px 12px;
    display: flex;
    gap: 6px;
  }

  .mover {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--hm-separator);
    border: 1px solid var(--hm-border-subtle);
    border-radius: 5px;
    padding: 5px 8px;
  }

  .mover-icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--hm-icon-bg);
  }

  .mover-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .mover-name {
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--hm-text-secondary);
    flex: 1;
  }

  .mover-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
  }

  .mover-pct.up { color: var(--hm-green); }
  .mover-pct.down { color: var(--hm-red); }

  /* Footer */
  .foot {
    padding: 7px 16px;
    border-top: 1px solid var(--hm-border-subtle);
    font-family: 'BigNoodleTitling', 'Poppins', sans-serif;
    font-size: 13px;
    color: var(--hm-text-muted);
    display: flex;
    justify-content: space-between;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

</style>
</head>
<body>

<div class="report hm-panel">
  <div class="result win">
    <div class="god-img hm-god-icon">
      <img src="../Custom God Icons/Ymir.png" onerror="this.src='../data/god_icons/ymir.png'">
    </div>
    <div class="result-info">
      <div class="result-tag">Victory</div>
      <div class="result-sub">Ymir — Conquest</div>
    </div>
    <div class="kda-container">
      <div class="kda-big">8 / 2 / 6</div>
      <div class="streak-badge win">W3</div>
    </div>
  </div>

  <div class="movement">
    <div class="prices">
      <span class="old-price">280</span>
      <span class="arrow">→</span>
      <span class="new-price up">312</span>
    </div>
    <div class="change-badge up">+11.4%</div>
  </div>

  <div class="shares">
    <span style="color:var(--hm-gold);font-weight:700;">FREE</span>
    <span><strong>1 free share</strong> to <strong>142</strong> viewers — worth <strong>312</strong> hats</span>
  </div>

  <div class="movers">
    <div class="mover">
      <div class="mover-icon"><img src="../Custom God Icons/Ymir.png" onerror="this.src='../data/god_icons/ymir.png'"></div>
      <span class="mover-name">Ymir</span>
      <span class="mover-pct up">+11.4%</span>
    </div>
    <div class="mover">
      <div class="mover-icon"><img src="../Custom God Icons/Danzaburou.png" onerror="this.src='../data/god_icons/danzaburou.png'"></div>
      <span class="mover-name">Danz</span>
      <span class="mover-pct up">+8.2%</span>
    </div>
    <div class="mover">
      <div class="mover-icon"><img src="../Custom God Icons/Agni.png" onerror="this.src='../data/god_icons/agni.png'"></div>
      <span class="mover-name">Agni</span>
      <span class="mover-pct down">-6.1%</span>
    </div>
  </div>

  <div class="foot">
    <span>Hatmas Market</span>
    <span>!portfolio · !price · !buy · !sell</span>
  </div>
</div>


</body>
</html>
