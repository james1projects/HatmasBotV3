<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hatmas Market — Dividend</title>
<link rel="stylesheet" href="hatmas_theme.css">
<style>
  body {
    background: transparent;
    overflow: hidden;
    width: 420px;
    height: 170px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .popup {
    width: 380px;
    background: var(--hm-bg);
    border: 1px solid var(--hm-border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    position: relative;

    opacity: 0;
    transform: translateY(-20px);
    animation: enter 0.35s ease-out 0.2s forwards;
  }

  @keyframes enter {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Subtle top accent */
  .popup::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 10%, var(--hm-gold) 50%, transparent 90%);
    opacity: 0.6;
  }

  .god-img {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--hm-icon-bg);
    flex-shrink: 0;
  }

  .god-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .content {
    flex: 1;
  }

  .tag {
    font-family: 'BigNoodleTitling', 'Poppins', sans-serif;
    font-size: 16px;
    font-weight: normal;
    color: var(--hm-gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 1px;
  }

  .main-text {
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    color: var(--hm-text);
    line-height: 1.3;
  }

  .main-text strong {
    color: var(--hm-text);
    font-weight: 700;
  }

  .sub-text {
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    color: var(--hm-text-muted);
    margin-top: 2px;
  }

  .sub-text strong {
    color: var(--hm-text-secondary);
  }

  .payout-wrap {
    flex-shrink: 0;
    text-align: right;
  }

  .payout {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: var(--hm-gold);
  }

  .payout-label {
    font-family: 'Poppins', sans-serif;
    font-size: 9px;
    color: var(--hm-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: right;
  }

</style>
</head>
<body>

<div class="popup hm-panel" id="popup">
  <div class="god-img">
    <img id="godIcon" src="" alt="">
  </div>

  <div class="content">
    <div class="tag">Dividend</div>
    <div class="main-text" id="mainText">—</div>
    <div class="sub-text" id="subText">—</div>
  </div>

  <div class="payout-wrap">
    <div class="payout" id="payoutDisplay">0%</div>
    <div class="payout-label">per share</div>
  </div>
</div>

<script src="overlay_client.js"></script>
<script>
function animatePayoutPercentage(targetPercent, duration) {
  duration = duration || 600;
  const payoutDisplay = document.getElementById('payoutDisplay');
  const startTime = performance.now();

  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const currentValue = Math.floor(targetPercent * progress);
    payoutDisplay.textContent = currentValue + '%';
    if (progress < 1) {
      requestAnimationFrame(update);
    } else {
      payoutDisplay.textContent = targetPercent + '%';
    }
  }

  requestAnimationFrame(update);
}

function onShow(data) {
  if (!data) return;

  const godName = data.god_name || data.god || '—';

  // God icon
  const icon = document.getElementById('godIcon');
  icon.src = '/icons/custom/' + godName + '.png';
  icon.onerror = () => {
    icon.src = '/icons/gods/' + godName.toLowerCase().replace(/\s+/g, '-') + '.png';
  };

  // Main text
  const rate = data.rate || 0;
  const ratePct = Math.round(rate * 100);
  document.getElementById('mainText').innerHTML =
    '<strong>' + godName + '</strong> shareholders paid <strong>' + ratePct + '%</strong>';

  // Sub text
  const holders = data.holders || 0;
  const totalHats = data.total_hats || 0;
  document.getElementById('subText').innerHTML =
    '<strong>' + holders + '</strong> holders · ' + HatmasOverlay.hatPrice(totalHats) + ' distributed';

  // Animate payout
  animatePayoutPercentage(ratePct, 600);
}

function onHide() {
  // Handled by overlay_client.js
}

HatmasOverlay.connect('economy_dividend', { onShow, onHide });
</script>
</body>
</html>
