<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hatmas Market — Dividend Notification</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    width: 460px;
    height: 200px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 20px;
  }

  .dividend-popup {
    width: 420px;
    background: linear-gradient(155deg, rgba(12,12,24,0.96) 0%, rgba(8,8,16,0.98) 100%);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 30px rgba(212,175,55,0.08);
    position: relative;

    opacity: 0;
    transform: translateY(-30px) scale(0.95);
    animation:
      popup-enter 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards,
      popup-exit 0.4s ease-in 7s forwards;
  }

  @keyframes popup-enter {
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes popup-exit {
    to {
      opacity: 0;
      transform: translateY(-15px) scale(0.97);
    }
  }

  /* Gold shimmer top bar */
  .shimmer-bar {
    height: 3px;
    background: linear-gradient(90deg, transparent, #d4af37, #f5e6a3, #d4af37, transparent);
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .popup-content {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Coin icon */
  .coin-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(145deg, #d4af37, #b8941f);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(212,175,55,0.3);
    position: relative;
    animation: coin-spin 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s;
  }

  @keyframes coin-spin {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(180deg); }
    100% { transform: rotateY(360deg); }
  }

  /* Sparkle particles */
  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #f5e6a3;
    border-radius: 50%;
    animation: sparkle-fly 1s ease-out forwards;
    opacity: 0;
  }

  .sparkle:nth-child(1) { animation-delay: 0.8s; top: 0; left: 50%; }
  .sparkle:nth-child(2) { animation-delay: 0.9s; top: 50%; right: 0; }
  .sparkle:nth-child(3) { animation-delay: 1.0s; bottom: 0; left: 30%; }
  .sparkle:nth-child(4) { animation-delay: 1.1s; top: 20%; left: 0; }

  @keyframes sparkle-fly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx, 20px), var(--dy, -20px)) scale(0); }
  }

  .sparkle:nth-child(1) { --dx: 5px; --dy: -25px; }
  .sparkle:nth-child(2) { --dx: 25px; --dy: 5px; }
  .sparkle:nth-child(3) { --dx: -10px; --dy: 25px; }
  .sparkle:nth-child(4) { --dx: -25px; --dy: -5px; }

  .popup-info {
    flex: 1;
  }

  .dividend-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    color: #d4af37;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .dividend-main {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: #e8e8f0;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .dividend-main strong {
    color: #d4af37;
    font-weight: 700;
  }

  .dividend-main .god-name {
    color: #60a5fa;
    font-weight: 700;
  }

  .dividend-detail {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #64748b;
  }

  .dividend-detail strong {
    color: #94a3b8;
  }

  /* Hat emoji rain */
  .hat-rain {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 14px;
  }

  .falling-hat {
    position: absolute;
    font-size: 14px;
    opacity: 0;
    animation: fall 2s ease-in forwards;
  }

  @keyframes fall {
    0% { opacity: 0.7; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(160px) rotate(120deg); }
  }
</style>
</head>
<body>

<div class="dividend-popup">
  <div class="shimmer-bar"></div>

  <div class="hat-rain" id="hatRain"></div>

  <div class="popup-content">
    <div class="coin-icon">
      🎩
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>
    <div class="popup-info">
      <div class="dividend-label">DIVIDEND PAYOUT</div>
      <div class="dividend-main">
        <span class="god-name">Ymir</span> shareholders earned <strong>5% dividend</strong>
      </div>
      <div class="dividend-detail">
        <strong>47 shareholders</strong> paid out — <strong>2,340 hats</strong> distributed
      </div>
    </div>
  </div>
</div>

<script>
  // Hat rain effect
  const rain = document.getElementById('hatRain');
  const hats = ['🎩', '👒', '🧢', '⛑️', '🪖'];

  for (let i = 0; i < 12; i++) {
    const hat = document.createElement('div');
    hat.className = 'falling-hat';
    hat.textContent = hats[Math.floor(Math.random() * hats.length)];
    hat.style.left = (Math.random() * 90 + 5) + '%';
    hat.style.animationDelay = (0.8 + Math.random() * 1.5) + 's';
    hat.style.animationDuration = (1.5 + Math.random() * 1) + 's';
    rain.appendChild(hat);
  }
</script>
</body>
</html>
