<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hatmas Market — Portfolio Leaderboard</title>
<link rel="stylesheet" href="hatmas_theme.css">
<style>
  body {
    background: transparent;
    overflow: hidden;
    width: 260px;
    height: 360px;
  }

  .board {
    width: 240px;
    background: var(--hm-bg);
    border: 1px solid var(--hm-border);
    border-radius: 10px;
    overflow: hidden;
  }

  .board-header {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--hm-border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .board-title {
    font-family: 'BigNoodleTitling', 'Poppins', sans-serif;
    font-size: 17px;
    color: var(--hm-text-secondary);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .board-subtitle {
    font-family: 'Poppins', sans-serif;
    font-size: 9px;
    color: var(--hm-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .rows {
    padding: 6px 0;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    transition: background 0.2s;
  }

  .row:hover {
    background: var(--hm-bg-subtle);
  }

  .rank-container {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .rank {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    width: 18px;
    text-align: center;
  }

  .rank-arrow {
    font-family: monospace;
    font-size: 10px;
    width: 8px;
    text-align: center;
  }

  .row:nth-child(1) .rank { color: var(--hm-gold-bright); }
  .row:nth-child(2) .rank { color: var(--hm-text-secondary); }
  .row:nth-child(3) .rank { color: var(--hm-gold); }
  .row:nth-child(4) .rank,
  .row:nth-child(5) .rank { color: var(--hm-text-muted); }

  .rank-arrow.up { color: var(--hm-green); }
  .rank-arrow.down { color: var(--hm-red); }
  .rank-arrow.same { color: var(--hm-text-muted); }

  .viewer-info {
    flex: 1;
    min-width: 0;
  }

  .viewer-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: var(--hm-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .viewer-holdings {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 1px;
  }

  .holding-icon {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    overflow: hidden;
    background: var(--hm-icon-bg);
  }

  .holding-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .portfolio-value {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: var(--hm-text-secondary);
    flex-shrink: 0;
    text-align: right;
  }

  .portfolio-change {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-align: right;
  }

  .portfolio-change.up { color: var(--hm-green); }
  .portfolio-change.down { color: var(--hm-red); }

  .value-col {
    flex-shrink: 0;
    text-align: right;
  }

  /* Footer */
  .board-footer {
    padding: 7px 14px;
    border-top: 1px solid var(--hm-separator);
    font-family: 'BigNoodleTitling', 'Poppins', sans-serif;
    font-size: 11px;
    color: var(--hm-text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }

/* Entry animation */
  .row {
    opacity: 0;
    transform: translateX(-10px);
    animation: row-enter 0.3s ease-out forwards;
  }

  .row:nth-child(1) { animation-delay: 0.1s; }
  .row:nth-child(2) { animation-delay: 0.2s; }
  .row:nth-child(3) { animation-delay: 0.3s; }
  .row:nth-child(4) { animation-delay: 0.4s; }
  .row:nth-child(5) { animation-delay: 0.5s; }

  @keyframes row-enter {
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="board hm-panel">
  <div class="board-header">
    <span class="board-title">Top Investors</span>
    <span class="board-subtitle">Portfolio Value</span>
  </div>

  <div class="rows" id="rows"></div>

  <div class="board-footer">!portfolio · !market</div>
</div>

<script>
const CUSTOM_ICON_PATH = '../Custom God Icons/';
const DEFAULT_ICON_PATH = '../data/god_icons/';

// Mock data with rank change indicators
const investors = [
  {
    name: "CoolViewer99",
    value: 14820,
    change: +8.2,
    rankChange: 1,  // 1 = up, -1 = down, 0 = same
    topGods: ["Ymir", "Athena", "Poseidon"]
  },
  {
    name: "SmiteTrader",
    value: 11450,
    change: +3.1,
    rankChange: 0,  // stayed same
    topGods: ["Ymir", "Danzaburou"]
  },
  {
    name: "xXDiamondXx",
    value: 9200,
    change: -2.4,
    rankChange: -1,  // down
    topGods: ["Thanatos", "Bellona", "Ymir"]
  },
  {
    name: "HatCollector",
    value: 7880,
    change: +12.6,
    rankChange: 1,  // up
    topGods: ["Danzaburou", "Kukulkan"]
  },
  {
    name: "FrostyInvestor",
    value: 6340,
    change: -0.8,
    rankChange: 0,  // stayed same
    topGods: ["Ymir", "Agni", "Hercules"]
  }
];

function iconUrl(name) {
  return CUSTOM_ICON_PATH + name + '.png';
}

function fallbackUrl(name) {
  return DEFAULT_ICON_PATH + name.toLowerCase().replace(/\s+/g, '-') + '.png';
}

function formatValue(v) {
  if (v >= 10000) return (v / 1000).toFixed(1) + 'k';
  return v.toLocaleString();
}

function getRankArrow(rankChange) {
  if (rankChange > 0) return '▲';
  if (rankChange < 0) return '▼';
  return '—';
}

function getRankArrowClass(rankChange) {
  if (rankChange > 0) return 'up';
  if (rankChange < 0) return 'down';
  return 'same';
}

function render() {
  const el = document.getElementById('rows');
  el.innerHTML = investors.map((inv, i) => {
    const cls = inv.change >= 0 ? 'up' : 'down';
    const arrow = inv.change >= 0 ? '+' : '';
    const rankArrow = getRankArrow(inv.rankChange);
    const rankArrowClass = getRankArrowClass(inv.rankChange);
    const icons = inv.topGods.map(g =>
      `<div class="holding-icon"><img src="${iconUrl(g)}" onerror="this.src='${fallbackUrl(g)}'"></div>`
    ).join('');

    return `
      <div class="row">
        <div class="rank-container">
          <span class="rank">${i + 1}</span>
          <span class="rank-arrow ${rankArrowClass}">${rankArrow}</span>
        </div>
        <div class="viewer-info">
          <div class="viewer-name">${inv.name}</div>
          <div class="viewer-holdings">${icons}</div>
        </div>
        <div class="value-col">
          <div class="portfolio-value">${formatValue(inv.value)}</div>
          <div class="portfolio-change ${cls}">${arrow}${inv.change}%</div>
        </div>
      </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
