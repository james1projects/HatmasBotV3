<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#202C39">
<title>404: Hatmas Market</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="/theme.css">
<style>
  .wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
  .brand-band {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
    padding: 8px 0 12px;
    margin-bottom: 64px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-dim);
  }
  .brand-band .left {
    color: var(--accent);
    font-weight: 700;
    text-decoration: none;
  }

  .err {
    text-align: center;
  }
  .err .kicker {
    margin-bottom: 18px;
  }
  .err .code {
    font-family: var(--font-mono);
    font-size: 96px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.05em;
    margin: 0 0 12px;
  }
  .err h1 {
    font-size: 32px;
    margin: 0 0 18px;
    letter-spacing: -0.02em;
    font-weight: 700;
    line-height: 1.05;
  }
  .err p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
    margin: 0 auto 28px;
    max-width: 440px;
  }
  .err .home-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    transition: border-color 0.12s, transform 0.12s, background 0.12s;
  }
  .err .home-link:hover {
    border-color: var(--accent);
    background: var(--panel-hi);
    transform: translateY(-1px);
  }

  @media (max-width: 480px) {
    .err .code { font-size: 72px; }
    .err h1 { font-size: 26px; }
    .brand-band { margin-bottom: 40px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand-band">
      <a class="left" href="/"><img class="brand-hat" src="/hat.png" alt="">// HATMASTER.TV</a>
      <div>404</div>
    </div>

    <div class="err">
      <div class="kicker">// SIGNAL LOST</div>
      <div class="code">404</div>
      <h1>Off the chart.</h1>
      <p>This page does not exist. Check the URL for a typo, or head
         back to the market.</p>
      <a class="home-link" href="/">&larr; Back to the market</a>
    </div>
  </div>
</body>
</html>
